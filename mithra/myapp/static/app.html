<html>
<head>
<title>Random Thirukkural</title>

<style>

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background-color:#f0e6d6;
font-family:Verdana;
}

.container{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
width:320px;
box-shadow:0 5px 12px rgba(0,0,0,0.2);
}

h2{
color:#6b3f1d;
}

button{
margin-top:15px;
padding:10px 15px;
border:none;
background-color:#6b3f1d;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background-color:#8a5527;
}

</style>

</head>

<body>

<div class="container">

<h2>Random Thirukkural</h2>

<p id="num">Kural Number will appear here</p>

<p id="line">Press the button to see a Thirukkural</p>

<p id="explain"></p>

<button onclick="generate()">Show Kural</button>

</div>

<script>

let data = [

{
no:1,
line:"அகர முதல எழுத்தெல்லாம் ஆதி பகவன் முதற்றே உலகு",
explain:"God is the beginning of everything just like A is the first letter."
},

{
no:2,
line:"கற்றதனால் ஆய பயனென்கொல் வாலறிவன் நற்றாள் தொழாஅர் எனின்",
explain:"Learning is useless if a person does not respect wisdom."
},

{
no:3,
line:"மலர்மிசை ஏகினான் மாணடி சேர்ந்தார் நிலமிசை நீடுவாழ் வார்",
explain:"Those who follow good values will live happily."
}

];

function generate(){

let index = Math.floor(Math.random() * data.length);

document.getElementById("num").innerText =
"Kural No: " + data[index].no;

document.getElementById("line").innerText =
data[index].line;

document.getElementById("explain").innerText =
data[index].explain;

}

</script>

</body>
</html>
